name: deploy

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release-candidate-verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 10.28.1
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      - run: bash .codex/scripts/run_verify_commands.sh

  release-candidate-package:
    needs: release-candidate-verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 10.28.1
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: |
          mkdir -p release-artifacts
          cp -R dist release-artifacts/dist
          cp -R docs/release release-artifacts/release-docs
          if [ -d ".perf-results" ]; then
            cp -R .perf-results release-artifacts/perf-results
          fi
          tar -czf release-candidate.tgz release-artifacts
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-candidate
          path: release-candidate.tgz
