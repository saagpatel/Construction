name: deploy

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release-candidate-verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          version: 10.28.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      - run: bash .codex/scripts/run_verify_commands.sh

  release-candidate-package:
    needs: release-candidate-verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          version: 10.28.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: |
          mkdir -p release-artifacts
          cp -R dist release-artifacts/dist
          cp -R docs/release release-artifacts/release-docs
          if [ -d ".perf-results" ]; then
            cp -R .perf-results release-artifacts/perf-results
          fi
          tar -czf release-candidate.tgz release-artifacts
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-candidate
          path: release-candidate.tgz
