name: deploy

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release-candidate-verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061
        with:
          version: 10.28.1
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      - run: bash .codex/scripts/run_verify_commands.sh

  release-candidate-package:
    needs: release-candidate-verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061
        with:
          version: 10.28.1
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: |
          mkdir -p release-artifacts
          cp -R dist release-artifacts/dist
          cp -R docs/release release-artifacts/release-docs
          if [ -d ".perf-results" ]; then
            cp -R .perf-results release-artifacts/perf-results
          fi
          tar -czf release-candidate.tgz release-artifacts
      - uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: release-candidate
          path: release-candidate.tgz
